name: Build and Release

# Trigger: push a tag like "v0.1.0" → builds all platforms and creates a GitHub release
on:
  push:
    tags:
      - 'v*'

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Windows (amd64) — exe with embedded icon
  # ──────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install goversioninfo
        run: go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest

      - name: Embed icon
        working-directory: lostcity-client
        run: goversioninfo -64 -o resource.syso

      - name: Build
        working-directory: lostcity-client
        run: go build -ldflags="-H windowsgui" -o 2004sp-client-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: lostcity-client/2004sp-client-windows.exe

  # ──────────────────────────────────────────────────────────────────────
  # macOS — universal binary (Intel + Apple Silicon) via lipo
  # Runs on a single macos-latest (arm64) runner — no macos-13 queue wait
  # ──────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build arm64
        working-directory: lostcity-client
        run: go build -o 2004sp-client-arm64

      - name: Build amd64 (cross from arm64 host with macOS SDK)
        working-directory: lostcity-client
        env:
          GOARCH: amd64
          CGO_ENABLED: 1
          CGO_CFLAGS: "-arch x86_64"
          CGO_LDFLAGS: "-arch x86_64"
          SDKROOT: /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk
        run: go build -o 2004sp-client-amd64

      - name: Merge into universal binary
        working-directory: lostcity-client
        run: lipo -create -output 2004sp-client-macos 2004sp-client-arm64 2004sp-client-amd64

      - name: Create .app bundle
        working-directory: lostcity-client
        run: |
          APP=2004sp-client-macos.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp 2004sp-client-macos "$APP/Contents/MacOS/lostcity"
          cp build/darwin/Info.plist "$APP/Contents/"
          cp build/darwin/icons.icns "$APP/Contents/Resources/"
          zip -r 2004sp-client-macos.zip "$APP"

      - uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: lostcity-client/2004sp-client-macos.zip

  # ──────────────────────────────────────────────────────────────────────
  # Linux (amd64) — binary + icon + .desktop in a tarball
  # ──────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install WebKit/GTK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Build
        working-directory: lostcity-client
        run: go build -o 2004sp-client-linux

      - name: Package
        working-directory: lostcity-client
        run: |
          mkdir -p pkg
          cp 2004sp-client-linux pkg/2004sp-client
          cp build/appicon.png pkg/icon.png
          cat > pkg/lostcity.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Name=2004scape
          Comment=Lost City MMO Client
          Exec=./2004sp-client
          Icon=./icon.png
          Terminal=false
          Type=Application
          Categories=Game;
          StartupWMClass=lostcity
          EOF
          tar -czf 2004sp-client-linux.tar.gz -C pkg .

      - uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: lostcity-client/2004sp-client-linux.tar.gz

  # ──────────────────────────────────────────────────────────────────────
  # Create GitHub Release with all binaries
  # ──────────────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/build-windows/2004sp-client-windows.exe
            artifacts/build-macos/2004sp-client-macos.zip
            artifacts/build-linux/2004sp-client-linux.tar.gz
