<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>2004 Singleplayer Progressive</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            html, body {
                background: #000;
                overflow: hidden;
                font-family: Arial, sans-serif;
                height: 100vh;
                width: 100vw;
            }

            /* Root flex row: canvas | hiscores panel | xp tracker panel | toolbar */
            #layout {
                display: flex;
                width: 100vw;
                height: 100vh;
            }

            /* Canvas grows to fill all remaining space, letterboxes to preserve 765:503 */
            #canvas-wrap {
                flex: 1 1 0;
                min-width: 0;
                overflow: hidden;
                background: #000;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #canvas {
                display: block;
                width: 100%;
                height: 100%;
                max-width: calc(100vh * 765 / 503);
                max-height: calc(100vw * 503 / 765);
            }

            /* ── Shared side panel base ── */
            .side-panel {
                flex-shrink: 0;
                flex-grow: 0;
                flex-basis: auto;
                max-width: 0;
                overflow: hidden;
                background: #0c0c0c;
                border-left: none;
                display: flex;
                flex-direction: column;
                transition: max-width 0.2s ease;
            }

            .side-panel.open {
                border-left: 1px solid #242424;
            }

            /* Hiscores panel */
            #hiscores-panel { width: 340px; }
            #hiscores-panel.open { max-width: 340px; }

            /* XP Tracker panel */
            #xptracker-panel { width: 280px; }
            #xptracker-panel.open { max-width: 280px; }

            /* Toolbar — fixed width, never overlaps canvas */
            #toolbar {
                flex: 0 0 44px;
                background: #0f0f0f;
                border-left: 1px solid #242424;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding-top: 8px;
                gap: 4px;
            }

            .tool-btn {
                width: 34px;
                height: 34px;
                background: #1a1a1a;
                border: 1px solid #2e2e2e;
                border-radius: 4px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 17px;
                color: #666;
                transition: background 0.15s, border-color 0.15s, color 0.15s;
                user-select: none;
            }

            .tool-btn:hover {
                background: #222;
                border-color: #444;
                color: #ccc;
            }

            .tool-btn.active {
                background: #1c1800;
                border-color: #7a5f10;
                color: #ffd700;
            }

            /* ── Hiscores panel internals ── */

            .hs-header {
                padding: 11px 12px 10px;
                border-bottom: 1px solid #1e1e1e;
                flex-shrink: 0;
            }

            .hs-title {
                font-size: 11px;
                font-weight: bold;
                color: #ffd700;
                letter-spacing: 2px;
                text-transform: uppercase;
            }

            /* Skill tab grid */
            .hs-skills {
                display: flex;
                flex-wrap: wrap;
                gap: 3px;
                padding: 8px;
                flex-shrink: 0;
                border-bottom: 1px solid #1e1e1e;
                overflow-y: auto;
                max-height: 110px;
                scrollbar-width: thin;
                scrollbar-color: #2a2a2a #0c0c0c;
            }

            .skill-tab {
                font-size: 10px;
                padding: 3px 8px;
                background: #141414;
                border: 1px solid #272727;
                border-radius: 3px;
                color: #666;
                cursor: pointer;
                white-space: nowrap;
                transition: background 0.12s, color 0.12s, border-color 0.12s;
                user-select: none;
            }

            .skill-tab:hover {
                background: #1e1e1e;
                color: #aaa;
                border-color: #3a3a3a;
            }

            .skill-tab.active {
                background: #1c1800;
                border-color: #7a5f10;
                color: #ffd700;
            }

            /* Scrollable table area */
            .hs-table-wrap {
                flex: 1;
                overflow-y: auto;
                scrollbar-width: thin;
                scrollbar-color: #2a2a2a #0c0c0c;
            }

            .hs-message {
                padding: 24px 12px;
                text-align: center;
                color: #3a3a3a;
                font-size: 12px;
            }

            table.hs-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 12px;
            }

            table.hs-table thead th {
                position: sticky;
                top: 0;
                background: #111;
                color: #444;
                font-size: 10px;
                font-weight: normal;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                padding: 7px 10px;
                text-align: left;
                border-bottom: 1px solid #1e1e1e;
            }

            table.hs-table thead th.r { text-align: right; }

            table.hs-table tbody tr {
                border-bottom: 1px solid #151515;
                transition: background 0.08s;
            }

            table.hs-table tbody tr:hover { background: #141414; }

            table.hs-table tbody td {
                padding: 7px 10px;
                color: #bbb;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 120px;
            }

            .td-rank  { color: #404040; font-size: 11px; width: 30px; }
            .td-name  { color: #d0d0d0; max-width: 130px; }
            .td-level { color: #ffd700; font-weight: bold; text-align: right; }
            .td-xp    { color: #555; font-size: 11px; text-align: right; }

            /* ── XP Tracker panel internals ── */

            .xpt-header {
                padding: 11px 12px 10px;
                border-bottom: 1px solid #1e1e1e;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .xpt-title {
                font-size: 11px;
                font-weight: bold;
                color: #ffd700;
                letter-spacing: 2px;
                text-transform: uppercase;
                white-space: nowrap;
            }

            .xpt-reset-btn {
                font-size: 10px;
                padding: 3px 8px;
                background: #1a1a1a;
                border: 1px solid #2e2e2e;
                border-radius: 3px;
                color: #666;
                cursor: pointer;
                white-space: nowrap;
                transition: background 0.12s, color 0.12s, border-color 0.12s;
                user-select: none;
            }

            .xpt-reset-btn:hover {
                background: #2a0000;
                border-color: #6a2020;
                color: #ff8080;
            }

            .xpt-scroll {
                flex: 1;
                overflow-y: auto;
                padding: 6px 0;
                scrollbar-width: thin;
                scrollbar-color: #2a2a2a #0c0c0c;
            }

            .xpt-empty {
                padding: 28px 14px;
                text-align: center;
                color: #2e2e2e;
                font-size: 12px;
            }

            .xpt-row {
                padding: 8px 12px 7px;
                border-bottom: 1px solid #111;
            }

            .xpt-row:last-child { border-bottom: none; }

            .xpt-row-top {
                display: flex;
                align-items: baseline;
                gap: 6px;
                margin-bottom: 5px;
            }

            .xpt-skill-name {
                font-size: 11px;
                font-weight: bold;
                color: #e8e8e8;
                flex: 1;
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .xpt-level {
                font-size: 10px;
                color: #aaa;
                white-space: nowrap;
            }

            .xpt-gained {
                font-size: 11px;
                color: #90ee90;
                font-weight: bold;
                white-space: nowrap;
            }

            /* Progress bar track */
            .xpt-bar-track {
                height: 5px;
                background: #1a1a1a;
                border-radius: 3px;
                overflow: hidden;
                margin-bottom: 4px;
            }

            .xpt-bar-fill {
                height: 100%;
                border-radius: 3px;
                transition: width 0.3s ease;
                opacity: 0.85;
            }

            .xpt-to-next {
                font-size: 10px;
                color: #777;
                text-align: right;
            }

            .xpt-maxed {
                font-size: 10px;
                color: #7a5f10;
                text-align: right;
                font-weight: bold;
                letter-spacing: 1px;
            }

            /* Debug console */
            #debug-console {
                display: none;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 44px;
                height: 140px;
                background: rgba(0, 0, 0, 0.92);
                color: #0f0;
                font-family: monospace;
                font-size: 11px;
                padding: 8px 10px;
                overflow-y: auto;
                z-index: 200;
                border-top: 1px solid #2a2a2a;
                scrollbar-width: thin;
                scrollbar-color: #2a2a2a transparent;
            }

            #debug-console.visible { display: block; }
            #debug-console .log-line { margin: 1px 0; line-height: 1.5; }
            #debug-console .error { color: #f55; }
            #debug-console .warn  { color: #fa0; }
        </style>
    </head>
    <body>
        <div id="layout">
            <div id="canvas-wrap">
                <canvas id="canvas" width="765" height="503"></canvas>
            </div>

            <div id="hiscores-panel" class="side-panel">
                <div class="hs-header">
                    <div class="hs-title">Hiscores</div>
                </div>
                <div class="hs-skills" id="skill-tabs"></div>
                <div class="hs-table-wrap" id="hs-content">
                    <div class="hs-message" id="hs-msg">Select a skill above</div>
                    <table class="hs-table" id="hs-table" style="display:none">
                        <thead>
                            <tr>
                                <th></th>
                                <th>Player</th>
                                <th class="r">Level</th>
                                <th class="r">XP</th>
                            </tr>
                        </thead>
                        <tbody id="hs-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="xptracker-panel" class="side-panel">
                <div class="xpt-header">
                    <div class="xpt-title">XP Tracker</div>
                    <div class="xpt-reset-btn" id="btn-xp-reset" title="Reset session XP">Reset</div>
                </div>
                <div class="xpt-scroll" id="xpt-scroll">
                    <div class="xpt-empty" id="xpt-empty">No XP gained this session</div>
                    <div id="xpt-skills"></div>
                </div>
            </div>

            <div id="toolbar">
                <div class="tool-btn" id="btn-hiscores" title="Hiscores">&#9813;</div>
                <div class="tool-btn" id="btn-xpdrops" title="XP Drops">XP</div>
                <div class="tool-btn" id="btn-xptracker" title="XP Tracker">&#128200;</div>
            </div>
        </div>

        <div id="debug-console"></div>

        <script>
            // Debug console
            (function () {
                var el = document.getElementById('debug-console');
                var _log = console.log, _err = console.error, _warn = console.warn;
                function addLine(cls, args) {
                    var d = document.createElement('div');
                    d.className = 'log-line' + (cls ? ' ' + cls : '');
                    d.textContent = new Date().toLocaleTimeString() + '  ' + Array.from(args).join(' ');
                    el.appendChild(d);
                    el.scrollTop = el.scrollHeight;
                }
                console.log   = function () { addLine('',      arguments); _log.apply(console,  arguments); };
                console.error = function () { addLine('error', arguments); _err.apply(console,  arguments); };
                console.warn  = function () { addLine('warn',  arguments); _warn.apply(console, arguments); };
                document.addEventListener('keydown', function (e) {
                    if (e.key === '`') el.classList.toggle('visible');
                });
            })();

            // Hiscores
            (function () {
                // IDs are hiscore.type = PlayerStat enum index + 1 (server uses stat + 1)
                var SKILLS = [
                    { id: 'overall', label: 'Overall' },
                    { id: 1,  label: 'Attack' },
                    { id: 2,  label: 'Defence' },
                    { id: 3,  label: 'Strength' },
                    { id: 4,  label: 'Hitpoints' },
                    { id: 5,  label: 'Ranged' },
                    { id: 6,  label: 'Prayer' },
                    { id: 7,  label: 'Magic' },
                    { id: 8,  label: 'Cooking' },
                    { id: 9,  label: 'Woodcutting' },
                    { id: 10, label: 'Fletching' },
                    { id: 11, label: 'Fishing' },
                    { id: 12, label: 'Firemaking' },
                    { id: 13, label: 'Crafting' },
                    { id: 14, label: 'Smithing' },
                    { id: 15, label: 'Mining' },
                    { id: 16, label: 'Herblore' },
                    { id: 17, label: 'Agility' },
                    { id: 18, label: 'Thieving' },
                    { id: 21, label: 'Runecrafting' },
                ];

                var panelEl   = document.getElementById('hiscores-panel');
                var btnEl     = document.getElementById('btn-hiscores');
                var tabsEl    = document.getElementById('skill-tabs');
                var msgEl     = document.getElementById('hs-msg');
                var tableEl   = document.getElementById('hs-table');
                var bodyEl    = document.getElementById('hs-body');
                var isOpen    = false;
                var activeId  = 'overall';

                function fmt(n) { return Number(n).toLocaleString(); }

                function setLoading(msg) {
                    msgEl.textContent = msg;
                    msgEl.style.display = 'block';
                    tableEl.style.display = 'none';
                }

                function renderRows(data) {
                    if (!data || !data.length) {
                        setLoading('No data available.');
                        return;
                    }
                    bodyEl.innerHTML = data.map(function (e) {
                        return '<tr>' +
                            '<td class="td-rank">' + e.rank + '</td>' +
                            '<td class="td-name">' + e.username + '</td>' +
                            '<td class="td-level">' + fmt(e.level) + '</td>' +
                            '<td class="td-xp">'   + fmt(e.xp)   + '</td>' +
                        '</tr>';
                    }).join('');
                    msgEl.style.display = 'none';
                    tableEl.style.display = 'table';
                }

                function loadSkill(skillId) {
                    setLoading('Loading\u2026');
                    fetch('/api/hiscores?skill=' + skillId)
                        .then(function (r) { return r.json(); })
                        .then(renderRows)
                        .catch(function (e) {
                            setLoading('Failed to load.');
                            console.error('[hiscores]', e);
                        });
                }

                // Build skill tabs
                SKILLS.forEach(function (skill) {
                    var tab = document.createElement('div');
                    tab.className = 'skill-tab' + (skill.id === activeId ? ' active' : '');
                    tab.textContent = skill.label;
                    tab.addEventListener('click', function () {
                        document.querySelectorAll('.skill-tab').forEach(function (t) {
                            t.classList.remove('active');
                        });
                        tab.classList.add('active');
                        activeId = skill.id;
                        loadSkill(skill.id);
                    });
                    tabsEl.appendChild(tab);
                });

                btnEl.addEventListener('click', function () {
                    isOpen = !isOpen;
                    btnEl.classList.toggle('active', isOpen);
                    panelEl.classList.toggle('open', isOpen);
                    if (isOpen) loadSkill(activeId);
                });
            })();

            // XP Drops toggle
            (function () {
                var btn = document.getElementById('btn-xpdrops');
                window.XP_DROPS_ENABLED = true;
                btn.classList.add('active');
                btn.addEventListener('click', function () {
                    window.XP_DROPS_ENABLED = !window.XP_DROPS_ENABLED;
                    btn.classList.toggle('active', window.XP_DROPS_ENABLED);
                });
            })();

            // XP Tracker panel
            (function () {
                var panelEl  = document.getElementById('xptracker-panel');
                var btnEl    = document.getElementById('btn-xptracker');
                var resetBtn = document.getElementById('btn-xp-reset');
                var emptyEl  = document.getElementById('xpt-empty');
                var skillsEl = document.getElementById('xpt-skills');
                var isOpen   = false;

                function fmt(n) { return Number(n).toLocaleString(); }

                function renderTracker() {
                    var data = window.xpTrackerData;
                    if (!data || !data.entries || !data.entries.length) {
                        emptyEl.style.display = 'block';
                        skillsEl.innerHTML = '';
                        return;
                    }
                    emptyEl.style.display = 'none';
                    skillsEl.innerHTML = data.entries.map(function (e) {
                        var gained   = e.gained   | 0;
                        var xpToNext = e.xpToNext | 0;
                        var pct = Math.max(0, Math.min(100, e.progressPct || 0)).toFixed(2);
                        var subline = e.level >= 99
                            ? '<div class="xpt-maxed">MAX LEVEL</div>'
                            : '<div class="xpt-to-next">' + fmt(xpToNext) + ' xp to level ' + (e.level + 1) + '</div>';
                        return '<div class="xpt-row">' +
                            '<div class="xpt-row-top">' +
                                '<span class="xpt-skill-name">' + e.name + '</span>' +
                                '<span class="xpt-level">Lv&nbsp;' + e.level + '</span>' +
                                '<span class="xpt-gained">+' + fmt(gained) + '</span>' +
                            '</div>' +
                            '<div class="xpt-bar-track">' +
                                '<div class="xpt-bar-fill" style="width:' + pct + '%;background:' + e.colour + '"></div>' +
                            '</div>' +
                            subline +
                        '</div>';
                    }).join('');
                }

                window.addEventListener('xpupdate', renderTracker);

                resetBtn.addEventListener('click', function () {
                    if (typeof window.resetXpTracker === 'function') {
                        window.resetXpTracker();
                    }
                });

                btnEl.addEventListener('click', function () {
                    isOpen = !isOpen;
                    btnEl.classList.toggle('active', isOpen);
                    panelEl.classList.toggle('open', isOpen);
                    if (isOpen) renderTracker();
                });
            })();
        </script>

        <!-- Runtime config served dynamically by Go (reflects actual port settings) -->
        <script src="/client-config.js"></script>
        <script>
            (function () {
                var s = document.createElement('script');
                s.type = 'module';
                s.src = 'client.js';
                document.head.appendChild(s);
            })();
        </script>
    </body>
</html>
